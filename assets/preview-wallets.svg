<svg width="720" height="440" viewBox="0 0 720 440" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Arial',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0b1e"/>
      <stop offset="100%" stop-color="#12102a"/>
    </linearGradient>
    <linearGradient id="cardVc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1640"/>
      <stop offset="100%" stop-color="#160f35"/>
    </linearGradient>
    <linearGradient id="cardWhale" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1f35"/>
      <stop offset="100%" stop-color="#091624"/>
    </linearGradient>
    <linearGradient id="cardProto" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1508"/>
      <stop offset="100%" stop-color="#120f04"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="720" height="440" fill="url(#bg)"/>

  <!-- header -->
  <text x="36" y="44" fill="#a78bfa" font-size="22" font-weight="700" letter-spacing="-0.5">Atlas</text>
  <text x="96" y="44" fill="#4b3f72" font-size="14">smart money tracker</text>
  <circle cx="660" cy="36" r="5" fill="#22d3ee" filter="url(#glow)"/>
  <text x="672" y="41" fill="#22d3ee" font-size="12">live</text>
  <text x="36" y="62" fill="#4b3f72" font-size="11">5 wallets tracked · last scan 42s ago · 2 alerts today</text>

  <!-- ── card 1: VC wallet ── -->
  <rect x="28" y="80" width="208" height="148" rx="12" fill="url(#cardVc)" stroke="#3b2f6e" stroke-width="1"/>
  <rect x="28" y="80" width="208" height="4" rx="2" fill="#7c3aed"/>
  <!-- avatar -->
  <circle cx="56" cy="120" r="18" fill="#3b2f6e"/>
  <text x="56" y="125" fill="#a78bfa" font-size="14" font-weight="700" text-anchor="middle">MC</text>
  <!-- label pill -->
  <rect x="80" y="110" width="32" height="16" rx="8" fill="#3b0764"/>
  <text x="96" y="122" fill="#c4b5fd" font-size="9" font-weight="600" text-anchor="middle">VC</text>
  <!-- name + addr -->
  <text x="120" y="122" fill="#e2e8f0" font-size="12" font-weight="600">Multicoin Capital</text>
  <text x="80" y="140" fill="#6b5fa0" font-size="10">9WzDXwB…AWWM</text>
  <!-- divider -->
  <rect x="44" y="152" width="176" height="1" fill="#2d2550"/>
  <!-- stats row -->
  <text x="44" y="170" fill="#6b5fa0" font-size="10">NET 24H</text>
  <text x="44" y="186" fill="#4ade80" font-size="14" font-weight="700">+2,840 SOL</text>
  <text x="140" y="170" fill="#6b5fa0" font-size="10">TOP MOVE</text>
  <text x="140" y="186" fill="#c4b5fd" font-size="13" font-weight="600">JTO ▲</text>
  <!-- tx count -->
  <text x="44" y="210" fill="#6b5fa0" font-size="10">8 txns · last active 12m ago</text>

  <!-- ── card 2: Whale ── -->
  <rect x="256" y="80" width="208" height="148" rx="12" fill="url(#cardWhale)" stroke="#1e3a5f" stroke-width="1"/>
  <rect x="256" y="80" width="208" height="4" rx="2" fill="#0891b2"/>
  <circle cx="284" cy="120" r="18" fill="#1e3a5f"/>
  <text x="284" y="125" fill="#67e8f9" font-size="14" font-weight="700" text-anchor="middle">W1</text>
  <rect x="308" y="110" width="46" height="16" rx="8" fill="#083344"/>
  <text x="331" y="122" fill="#67e8f9" font-size="9" font-weight="600" text-anchor="middle">WHALE</text>
  <text x="362" y="122" fill="#e2e8f0" font-size="12" font-weight="600">SOL Whale #1</text>
  <text x="308" y="140" fill="#2a5f7a" font-size="10">Ciu2BHH…YYPW</text>
  <rect x="272" y="152" width="176" height="1" fill="#1e3a5f"/>
  <text x="272" y="170" fill="#2a5f7a" font-size="10">NET 24H</text>
  <text x="272" y="186" fill="#f87171" font-size="14" font-weight="700">−1,200 SOL</text>
  <text x="368" y="170" fill="#2a5f7a" font-size="10">TOP MOVE</text>
  <text x="368" y="186" fill="#67e8f9" font-size="13" font-weight="600">SOL ▼</text>
  <text x="272" y="210" fill="#2a5f7a" font-size="10">5 txns · last active 3h ago</text>

  <!-- ── card 3: Protocol ── -->
  <rect x="484" y="80" width="208" height="148" rx="12" fill="url(#cardProto)" stroke="#3d3008" stroke-width="1"/>
  <rect x="484" y="80" width="208" height="4" rx="2" fill="#d97706"/>
  <circle cx="512" cy="120" r="18" fill="#3d3008"/>
  <text x="512" y="125" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">JF</text>
  <rect x="536" y="110" width="56" height="16" rx="8" fill="#1c1100"/>
  <text x="564" y="122" fill="#fbbf24" font-size="9" font-weight="600" text-anchor="middle">PROTOCOL</text>
  <text x="600" y="122" fill="#e2e8f0" font-size="12" font-weight="600">Jito Foundation</text>
  <text x="536" y="140" fill="#5c4a0a" font-size="10">DfXygSm…XjH</text>
  <rect x="500" y="152" width="176" height="1" fill="#3d3008"/>
  <text x="500" y="170" fill="#5c4a0a" font-size="10">NET 24H</text>
  <text x="500" y="186" fill="#4ade80" font-size="14" font-weight="700">+480 SOL</text>
  <text x="596" y="170" fill="#5c4a0a" font-size="10">TOP MOVE</text>
  <text x="596" y="186" fill="#fbbf24" font-size="13" font-weight="600">JTO ▲</text>
  <text x="500" y="210" fill="#5c4a0a" font-size="10">3 txns · last active 1h ago</text>

  <!-- ── alert strip ── -->
  <rect x="28" y="252" width="664" height="60" rx="10" fill="#1a0f3a" stroke="#3b2f6e" stroke-width="1"/>
  <circle cx="56" cy="282" r="8" fill="#a78bfa" opacity="0.2"/>
  <circle cx="56" cy="282" r="4" fill="#a78bfa"/>
  <text x="76" y="278" fill="#a78bfa" font-size="11" font-weight="700">LATEST ALERT</text>
  <text x="76" y="296" fill="#c4b5fd" font-size="12">Multicoin Capital is accumulating JTO — 2,840 SOL deployed across 8 transactions</text>
  <text x="76" y="308" fill="#4b3f72" font-size="10">confidence: 0.91 · 12 minutes ago</text>
  <text x="620" y="284" fill="#4b3f72" font-size="10">1 / 2</text>

  <!-- ── correlation badge ── -->
  <rect x="28" y="330" width="664" height="50" rx="10" fill="#0c1a0c" stroke="#14532d" stroke-width="1"/>
  <text x="52" y="352" fill="#4ade80" font-size="11" font-weight="700">CORRELATION DETECTED</text>
  <text x="52" y="368" fill="#86efac" font-size="11">2 wallets moved JTO this cycle  ·  Multicoin Capital + Jito Foundation  ·  combined ~$4.2M</text>

  <!-- ── bottom bar ── -->
  <rect x="0" y="398" width="720" height="42" rx="0" fill="#09080f"/>
  <rect x="0" y="398" width="720" height="1" fill="#1e1640"/>
  <text x="36" y="424" fill="#2d2550" font-size="10">atlas · helius enhanced transactions · claude agent sdk · scanning every 60s</text>
  <text x="680" y="424" fill="#2d2550" font-size="10">v0.1</text>
</svg>
